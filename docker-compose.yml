# Docker Compose for Local Development
# This file helps you run the application locally with a PostgreSQL database

version: '3.8'

services:
  # PHP Application
  app:
    build: .
    container_name: applesauce-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=localpassword
      - DB_NAME=kalrul
      - DB_PORT=5432
      - APP_ENV=development
      - APP_DEBUG=true
    depends_on:
      - db
    volumes:
      # Mount source code for live development (optional)
      # Uncomment the next line to enable live reload
      # - .:/var/www/html
    restart: unless-stopped
    networks:
      - applesauce-network

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: applesauce-db
    environment:
      - POSTGRES_PASSWORD=localpassword
      - POSTGRES_DB=kalrul
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Uncomment to import SQL dump on startup
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - applesauce-network

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: applesauce-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@applesauce.local
      - PGADMIN_DEFAULT_PASSWORD=localpassword
    ports:
      - "8081:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - applesauce-network

volumes:
  postgres-data:
    driver: local

networks:
  applesauce-network:
    driver: bridge
